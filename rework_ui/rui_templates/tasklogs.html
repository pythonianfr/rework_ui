<!doctype html>
<html>
    <head>
        <title>"Rework Task Log"</title>
        <script
          src="https://code.jquery.com/jquery-3.4.1.slim.min.js"
          integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n"
          crossorigin="anonymous">
        </script>
        <link
            href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk"
            crossorigin="anonymous">
        <script
            src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"
            integrity="sha384-OgVRvuATP1z7JjHLkuOU7Xw704+h835Lr+6QL9UvYjZE3Ipu6Tp75j7Bh/kR0JKI"
            crossorigin="anonymous">
        </script>
        <link href="{{ url_for('tsview.static', filename='menu_stand_alone.css')}}" rel="stylesheet"/>
        <script src="{{ url_for('tsview.static', filename='menu_stand_alone_elm.js')}}"></script>
    </head>
    <body>
        <div class="grid-container">
            <div id="menu-elm">
            </div>
            <div class="main-content">
                <div id="logs"></div>
            </div>
        </div>
        <script src="{{ url_for('reworkui.static', filename='logview.js') }}"></script>
        <script>
         var app = Elm.Logview.init({
             node: document.getElementById("logs"),
             flags: {
                 baseurl: "{{homeurl}}",
                 taskid: {{taskid}}
             }
         });
        </script>
        <script>
         var menuapp = Elm.StandAloneMenu.init(
             {
                 node: document.getElementById('menu-elm'),
                 flags: {{flags_menu | safe}}
             }
         );
        </script>
        <script>
         menuapp.ports.saveMenuData.subscribe(function (data) {
             localStorage.setItem("menuData", JSON.stringify(data));
         });

         incache = localStorage.getItem("menuData")
         if (incache === null) {
             incache = '{"menuIsOpen": false}'
         }
         menuapp.ports.loadMenuData.send(incache);
        </script>
    </body>
</html>
